    <style>

}
        #timer-bar-container {

        .option-box {
    background: #1e293b;
    padding: 12px 15px; /* 增加一點內距 */

}

    box-shadow: 0 0 50px rgba(0, 0, 0, 0.8), inset 0 0 20px currentColor;
    
    /* 動畫過渡 */
    transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
        .result-screen {

<body style="margin: 0; overflow: hidden; user-select: none;">  

    <h1 id="gameTitle" class="game-title">小小租稅神射手</h1>
    <button id="startBtn" class="start-btn" onclick="startGame()"></button>
    <div id="registerBox" class="register-box">
        <input type="text" id="playerName" placeholder="請輸入座號" autocomplete="off">
        <button class="go-btn" onclick="goGame()">GO!</button>
    </div>

    <div id="game-container">
        <div id="ui-layer">
            <div class="question-card">
                <div class="flex justify-start items-center mb-3">
                    <div id="progress-text" class="text-sm text-cyan-400 font-bold tracking-widest">任務進度：1 / 10</div>
                </div>
                <h2 id="question-text" class="text-4xl font-black text-white mb-6 whitespace-normal leading-relaxed">正在載入戰術數據...</h2>
                <div id="options-container" class="grid grid-cols-3 gap-4 text-left text-3xl">
                    <div id="box-A" class="option-box">
                        <span class="font-black mr-2 text-cyan-400">A</span><span id="opt-A">---</span>
                    </div>
                    <div id="box-B" class="option-box">
                        <span class="font-black mr-2 text-cyan-400">B</span><span id="opt-B">---</span>
                    </div>
                    <div id="box-C" class="option-box">
                        <span class="font-black mr-2 text-cyan-400">C</span><span id="opt-C">---</span>
                    </div>
                </div>
                <div id="timer-bar-container">
                    <div id="timer-bar"></div>
                </div>
            </div>
        </div>
        <div id="hud">
            <div>目前得分：<span id="score" class="text-white text-2xl ml-2">0</span></div>
        </div>
        <div id="feedback"></div>
        <div id="result-screen" class="result-screen">
            <div class="border-4 border-cyan-400 p-16 text-center rounded-3xl bg-slate-900 shadow-2xl">
                <h1 class="text-6xl font-black mb-6 text-cyan-400">任務完成</h1>
                <p class="text-2xl text-white mb-4">感謝您的參與</p>
                <p class="text-xl mb-6 text-slate-400">最終得分</p>
                <p id="final-score" class="text-amber-400 text-7xl font-black">0</p>
            </div>
        </div>
        <canvas id="gameCanvas"></canvas>
    </div>

    <script>
        // --- 第一段 JS ---
        function startGame() {
            var title = document.getElementById('gameTitle');
            var startBtn = document.getElementById('startBtn');
            var registerBox = document.getElementById('registerBox');
            title.style.display = 'none';
            startBtn.style.display = 'none';
            registerBox.style.display = 'block';
        }

        function goGame() {
            var name = document.getElementById('playerName').value;
            if (name === "") {
                alert("請輸入班級與姓名才能開始喔！");
            } else {
               
                // 進入遊戲：隱藏註冊，顯示遊戲容器，關閉背景圖
                document.getElementById('registerBox').style.display = 'none';
                document.body.style.backgroundImage = 'none';
                document.body.style.cursor = 'none';
                document.getElementById('game-container').style.display = 'flex';
                initGame();
                animate();
            }
        }

        // --- 第二段 JS (完全保留原始邏輯與繪圖) ---
        const rawQuestionBank = [
        { q: "1.我們國家的稅收可以分為哪兩類呢？", options: ["國稅及地方稅", "所得稅及房屋稅", "地價稅及營業稅"], correct: "國稅及地方稅" },
        { q: "2.遇到地方稅的相關問題，可以找哪一個機關詢問呢？", options: ["國稅局", "地方政府所屬稅捐(局)處", "警察局"], correct: "地方政府所屬稅捐(局)處" },
        { q: "3.因為雄妹是女孩子，所以她不能繼承遺產?", options: ["對，遺產只能由男生繼承", "錯，性別平等，女生也可以繼承遺產", "男生先分完財產，剩下的才輪到女生"], correct: "錯，性別平等，女生也可以繼承遺產" },
        { q: "4.以下哪個稅不是國稅呢?", options: ["所得稅", "營業稅", "房屋稅"], correct: "房屋稅" },
        { q: "5.使用牌照稅每年幾月繳納呢?", options: ["3月", "4月", "5月"], correct: "4月" },
        { q: "6.以下哪個組合是地方稅呢?", options: ["綜合所得稅、營業稅", "地價稅、房屋稅", "贈與稅、娛樂稅"], correct: "地價稅、房屋稅" },
        { q: "7.以下哪個方式不能繳稅呢?", options: ["到銀行繳稅", "到郵局繳稅", "稅額3萬元以下可以到超商繳稅"], correct: "到郵局繳稅" },
        { q: "8.請問統一發票什麼時候開獎呢？", options: ["每單月25號", "每雙月25號", "每個月25號"], correct: "每單月25號" },
        { q: "9.使用雲端發票有哪些好處呢？", options: ["省紙環保", "有雲端發票專屬獎，中獎機會多一次", "以上皆是"], correct: "以上皆是" },
        { q: "10.我遇到稅捐爭議案件了~可以找誰諮詢或協助呢？", options: ["警察", "納保官", "里長"], correct: "納保官" }
            ];

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreElement = document.getElementById('score');
    const questionText = document.getElementById('question-text');
    const progressText = document.getElementById('progress-text');
    const timerBar = document.getElementById('timer-bar');
    const feedback = document.getElementById('feedback');
    const resultScreen = document.getElementById('result-screen');
    const finalScoreDisplay = document.getElementById('final-score');
    
    const optA = document.getElementById('opt-A');
    const optB = document.getElementById('opt-B');
    const optC = document.getElementById('opt-C');
    const boxes = {
        'A': document.getElementById('box-A'),
        'B': document.getElementById('box-B'),
        'C': document.getElementById('box-C')
    };

    let gameQuestions = [];
    let currentQuestionIndex = 0;
    let score = 0;
    let mouse = { x: 0, y: 0 };
    let targets = [];
    let particles = [];
    let isGameOver = false;
    let isWaitingForNext = false;
    
    let timeLeft = 1.0;
    const TIME_LIMIT = 15.0;
    let timerInterval;

    class Target {
        constructor(label, xRange, y) {
            this.label = label;
            this.xRange = xRange;
            this.y = y;
            this.width = 130;
            this.height = 150;
            this.x = xRange[0] + Math.random() * (xRange[1] - xRange[0] - this.width);
            this.speed = 2.5 ;
            this.direction = Math.random() > 0.5 ? 1 : -1;
            this.isDown = false;
            this.tilt = 0;
            this.pulse = 0;
        }

        update() {
            this.pulse += 0.05;
            if (!this.isDown) {
                this.x += this.speed * this.direction;
                if (this.x < this.xRange[0] || this.x > this.xRange[1] - this.width) {
                    this.direction *= -1;
                }
            } else {
                if (this.tilt < Math.PI / 2) this.tilt += 0.15;
            }
        }

        draw() {
            ctx.save();
            ctx.strokeStyle = "rgba(79, 209, 197, 0.1)";
            ctx.setLineDash([5, 5]);
            ctx.strokeRect(this.xRange[0], this.y + 40, this.xRange[1] - this.xRange[0], 20);
            ctx.setLineDash([]);

            ctx.translate(this.x + this.width / 2, this.y + this.height);
            ctx.rotate(this.tilt);
            ctx.translate(-this.width / 2, -this.height);

            ctx.fillStyle = "#2d3748";
            ctx.fillRect(this.width / 2 - 12, this.height - 30, 24, 40);
            ctx.fillStyle = "#4fd1c5";
            ctx.fillRect(this.width / 2 - 2, this.height - 30, 4, 40);

            const glow = Math.sin(this.pulse) * 8 + 12;
            ctx.shadowBlur = this.isDown ? 0 : glow;
            ctx.shadowColor = "#4fd1c5";

            ctx.beginPath();
            ctx.arc(this.width / 2, 60, 55, 0, Math.PI * 2);
            ctx.fillStyle = "#1a202c";
            ctx.fill();
            ctx.strokeStyle = "#4fd1c5";
            ctx.lineWidth = 4;
            ctx.stroke();

            ctx.beginPath();
            ctx.arc(this.width / 2, 60, 42, 0, Math.PI * 2);
            ctx.strokeStyle = "rgba(79, 209, 197, 0.3)";
            ctx.lineWidth = 8;
            ctx.stroke();

            ctx.beginPath();
            ctx.arc(this.width / 2, 60, 18, 0, Math.PI * 2);
            ctx.fillStyle = "#4fd1c5";
            ctx.fill();

            ctx.shadowBlur = 10;
            ctx.fillStyle = "#fff";
            ctx.font = "900 64px 'Orbitron'";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText(this.label, this.width / 2, 64);

            ctx.restore();
        }

        checkHit(mx, my) {
            if (this.isDown || isGameOver || isWaitingForNext) return false;
            const cx = this.x + this.width / 2;
            const cy = this.y + 60;
            const dist = Math.sqrt((mx - cx)**2 + (my - cy)**2);
            if (dist < 55) {
                this.isDown = true;
                return true;
            }
            return false;
        }

        reset() {
            this.isDown = false;
            this.tilt = 0;
        }
    }

    function initGame() {
        canvas.width = 1000;
        canvas.height = 600;

        // 1. 直接取原始題庫的前 10 題 (不隨機排序)
        const fixedSelection = rawQuestionBank.slice(0, 10);

        // 2. 處理題目資料，並確保標籤正確
        gameQuestions = fixedSelection.map(q => {
            // 直接使用原始的 q.options，不移動順序
            const optionsFixed = [...q.options]; 
            
            // 找出正確答案在陣列中的位置 (0=A, 1=B, 2=C)
            const correctIndex = optionsFixed.indexOf(q.correct);
            const correctLabel = ["A", "B", "C"][correctIndex];
            
            return { ...q, shuffledOptions: optionsFixed, correctLabel };
        });

        // 3. 設定標靶位置 (這裡已經包含你剛才要求的下移數值 420)
        targets = [
            new Target('A', [50, 320], 420),
            new Target('B', [340, 660], 420),
            new Target('C', [680, 950], 420)
        ];

        score = 0;
        currentQuestionIndex = 0;
        isGameOver = false;
        scoreElement.innerText = score;
        resultScreen.style.display = "none";
        
        startNewQuestion();
    }

    function startNewQuestion() {
        if (currentQuestionIndex < gameQuestions.length) {
            const q = gameQuestions[currentQuestionIndex];
            questionText.innerText = q.q;
            progressText.innerText = `任務進度：${currentQuestionIndex + 1} / 10`;
            
            optA.innerText = q.shuffledOptions[0];
            optB.innerText = q.shuffledOptions[1];
            optC.innerText = q.shuffledOptions[2];

            // 重置選項標示
            Object.values(boxes).forEach(box => box.classList.remove('option-correct'));

            targets.forEach(t => t.reset());
            isWaitingForNext = false;
            
            resetTimer();
        } else {
            endGame();
        }
    }

    function resetTimer() {
        clearInterval(timerInterval);
        timeLeft = TIME_LIMIT;
        updateTimerUI();
        
        timerInterval = setInterval(() => {
            if (isWaitingForNext || isGameOver) return;
            
            timeLeft -= 0.1;
            if (timeLeft <= 0) {
                timeLeft = 0;
                handleTimeOut();
            }
            updateTimerUI();
        }, 100);
    }

    function updateTimerUI() {
        const percentage = (timeLeft / TIME_LIMIT) * 100;
        timerBar.style.width = `${percentage}%`;
        
        if (timeLeft < 1.5) {
            timerBar.style.background = "#f87171";
        } else {
            timerBar.style.background = "#4fd1c5";
        }
    }

    function highlightCorrectAnswer() {
        const q = gameQuestions[currentQuestionIndex];
        const correctBox = boxes[q.correctLabel];
        if (correctBox) {
            correctBox.classList.add('option-correct');
        }
    }

    function handleTimeOut() {
    isWaitingForNext = true;
    highlightCorrectAnswer();
    showFeedback("⏳ 超時！", false); // 加個圖示更直覺
    clearInterval(timerInterval);
    
    setTimeout(() => {
        currentQuestionIndex++;
        startNewQuestion();
    }, 1500);
}

    function endGame() {
        isGameOver = true;
        clearInterval(timerInterval);
        finalScoreDisplay.innerText = score;
        resultScreen.style.display = "flex";

// --- 自動上傳分數到 Google 表單 ---
        const name = document.getElementById('playerName').value; // 取得玩家姓名
        const formID = "1FAIpQLSe_wsv6i2HiQnM-MtJ4Kb2ZEwmGnLKdUC52lTqrMZ3he-qrSQ";
        const nameID = "entry.628463820";
        const scoreID = "entry.1081135647";

        // 組合傳送網址
        const sendURL = `https://docs.google.com/forms/d/e/${formID}/formResponse?${nameID}=${encodeURIComponent(name)}&${scoreID}=${score}&submit=Submit`;

        // 使用 fetch 在背景默默傳送，不影響玩家看到「任務完成」的畫面
        fetch(sendURL, {
            mode: 'no-cors'
        }).then(() => {
            console.log("資料已成功傳送至後台");
        }).catch((err) => {
            console.error("傳送發生錯誤:", err);
        });

    }

    function showFeedback(msg, isCorrect) {
    const color = isCorrect ? "#4fd1c5" : "#f87171"; // 命中用青色，錯誤用粉紅色
    
    feedback.innerText = msg;
    feedback.style.color = color;
    
    // 強制重置動畫狀態
    feedback.style.transition = 'none';
    feedback.style.opacity = "0";
    feedback.style.transform = "translate(-50%, -50%) scale(0.5)"; // 從小開始
    
    // 觸發重繪後顯示
    setTimeout(() => {
        feedback.style.transition = 'all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
        feedback.style.opacity = "1";
        feedback.style.transform = "translate(-50%, -50%) scale(1.2)"; // 彈跳變大
    }, 10);

    // 1.2 秒後消失
    setTimeout(() => {
        feedback.style.opacity = "0";
        feedback.style.transform = "translate(-50%, -50%) scale(1.0)";
    }, 1200);
}

    function handleShot() {
        if (isGameOver || isWaitingForNext) return;
        
        for(let i=0; i<12; i++){
            particles.push({
                x: mouse.x, y: mouse.y,
                vx: (Math.random()-0.5)*16, vy: (Math.random()-0.5)*16,
                life: 1.0, color: "#fff"
            });
        }

        targets.forEach(t => {
            if (t.checkHit(mouse.x, mouse.y)) {
                isWaitingForNext = true;
                clearInterval(timerInterval);
                const q = gameQuestions[currentQuestionIndex];
                
                highlightCorrectAnswer();

                if (t.label === q.correctLabel) {
                    score += 10;
                    scoreElement.innerText = score;
                    showFeedback("命中目標", true);
                } else {
                    showFeedback("目標錯誤", false);
                }
                
                setTimeout(() => {
                    currentQuestionIndex++;
                    startNewQuestion();
                }, 1500);
            }
        });
    }

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // 繪製背景裝飾（地平線感）



        ctx.strokeStyle = "rgba(79, 209, 197, 0.1)";
        ctx.lineWidth = 1;
        for(let i=0; i<canvas.width; i+=50){
            ctx.beginPath(); ctx.moveTo(i, 520); ctx.lineTo(i+20, 540); ctx.stroke();
        }

        targets.forEach(t => {
            t.update();
            t.draw();
        });

        // 粒子特效
        for(let i = particles.length-1; i >= 0; i--){
            const p = particles[i];
            p.x += p.vx; p.y += p.vy;
            p.life -= 0.05;
            if(p.life <= 0) particles.splice(i, 1);
            else {
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, 4, 4);
            }
        }
        ctx.globalAlpha = 1;

        // 繪製準星
        if (!isGameOver) {
            const pulse = Math.sin(Date.now() / 150) * 4;
            ctx.strokeStyle = isWaitingForNext ? "#4a5568" : "#4fd1c5";
            ctx.lineWidth = 2;
            
            const size = 30 + pulse;
            const gap = 15;
            
            ctx.beginPath();
            ctx.moveTo(mouse.x - size, mouse.y - size + gap);
            ctx.lineTo(mouse.x - size, mouse.y - size);
            ctx.lineTo(mouse.x - size + gap, mouse.y - size);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(mouse.x + size, mouse.y - size + gap);
            ctx.lineTo(mouse.x + size, mouse.y - size);
            ctx.lineTo(mouse.x + size - gap, mouse.y - size);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(mouse.x - size, mouse.y + size - gap);
            ctx.lineTo(mouse.x - size, mouse.y + size);
            ctx.lineTo(mouse.x - size + gap, mouse.y + size);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(mouse.x + size, mouse.y + size - gap);
            ctx.lineTo(mouse.x + size, mouse.y + size);
            ctx.lineTo(mouse.x + size - gap, mouse.y + size);
            ctx.stroke();

            ctx.beginPath();
            ctx.arc(mouse.x, mouse.y, 4, 0, Math.PI * 2);
            ctx.stroke();
        }

        requestAnimationFrame(animate);
    }

    canvas.addEventListener('mousemove', (e) => {
        const rect = canvas.getBoundingClientRect();
        mouse.x = (e.clientX - rect.left) * (canvas.width / rect.width);
        mouse.y = (e.clientY - rect.top) * (canvas.height / rect.height);
    });

    canvas.addEventListener('mousedown', (e) => {
        e.preventDefault();
        handleShot();
    });

    window.onload = () => {
        initGame();
        animate();
    };
</script>

</body>
</html>
