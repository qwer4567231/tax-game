<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>租稅小學堂</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 全螢幕鎖定，防止捲動 */
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #0d1117; user-select: none; touch-action: none; }
        
        /* 開始畫面背景 */
        #start-screen {
            position: fixed; inset: 0;
            background-image: url("遊戲封面.png"); background-size: cover; background-position: center;
            display: flex; flex-direction: column; align-items: center; z-index: 100;
        }
        .game-title { margin-top: 20px; font-size: 40px; color:#003060; font-weight: bold; text-shadow: 2px 2px 4px rgba(255,255,255,0.8); }
        
        /* 按鈕樣式 */
        .start-btn {
            background-image: url("開始按鈕.png"); background-size: contain; background-repeat: no-repeat; background-position: center;
            background-color: transparent; border: none; cursor: pointer;
            width: 280px; height: 100px; position: absolute; bottom: 10%;
        }
        .register-box {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 85%; max-width: 350px; background: rgba(255, 255, 255, 0.95);
            padding: 30px; border-radius: 20px; text-align: center; display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 2px solid #d05341; border-radius: 8px; font-size: 18px; outline: none; }
        .go-btn { background: #d05341; color: white; width: 100%; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 0 #a03d2e; }

        /* 遊戲區域 */
        #game-wrapper { position: relative; width: 100vw; height: 100vh; display: none; overflow: hidden; background: radial-gradient(circle at center, #1a202c 0%, #0d1117 100%); }
        canvas { display: block; width: 100%; height: 100%; }
        
        /* UI 題目層 */
        #ui-overlay {
            position: absolute; top: 10px; left: 0; width: 100%; 
            display: flex; flex-direction: column; align-items: center; pointer-events: none;
        }
        .question-card {
            background: rgba(15, 23, 42, 0.9); border: 2px solid #4fd1c5;
            padding: 12px; border-radius: 15px; width: 92%; max-width: 500px; pointer-events: auto;
        }
        .option-box { background: #1e293b; padding: 8px 12px; border-radius: 8px; border: 1px solid #334155; color: #cbd5e1; font-size: 14px; margin-bottom: 4px; }
        .option-correct { border-color: #10b981 !important; background: #064e3b !important; color: #fff !important; font-weight: bold; }
        
        /* 得分與回饋 */
        #hud { position: absolute; bottom: 20px; left: 20px; color: #4fd1c5; font-weight: bold; font-size: 24px; pointer-events: none; text-shadow: 0 0 10px rgba(79, 209, 197, 0.5); }
        #feedback {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 60px; font-weight: 900; opacity: 0; pointer-events: none; transition: 0.3s; z-index: 50;
        }
        .result-screen {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 200; color: white;
        }
    </style>
</head>
<body>

    <div id="start-screen">
        <h1 class="game-title">租稅射射看</h1>
        <button class="start-btn" onclick="showRegister()"></button>
        <div id="registerBox" class="register-box">
            <input type="text" id="playerName" placeholder="請輸入班級與姓名" autocomplete="off">
            <button class="go-btn" onclick="confirmEntry()">GO!</button>
        </div>
    </div>

    <div id="game-wrapper">
        <div id="ui-overlay">
            <div class="question-card">
                <div id="progress-text" class="text-xs text-cyan-400 font-bold mb-1">進度：1 / 10</div>
                <h2 id="question-text" class="text-lg font-bold text-white mb-2 leading-tight">載入中...</h2>
                <div id="options-container" class="flex flex-col text-left">
                    <div id="box-A" class="option-box">A. <span id="opt-A">---</span></div>
                    <div id="box-B" class="option-box">B. <span id="opt-B">---</span></div>
                    <div id="box-C" class="option-box">C. <span id="opt-C">---</span></div>
                </div>
                <div class="w-full bg-gray-700 h-1.5 mt-2 rounded-full overflow-hidden">
                    <div id="timer-bar" class="bg-cyan-400 h-full w-full"></div>
                </div>
            </div>
        </div>

        <div id="hud">得分：<span id="score">0</span></div>
        <div id="feedback"></div>
        <canvas id="gameCanvas"></canvas>

        <div id="result-screen" class="result-screen">
            <h1 class="text-4xl font-black text-cyan-400 mb-4">任務完成</h1>
            <p class="text-xl mb-2">最終得分</p>
            <p id="final-score" class="text-7xl font-black text-amber-400">0</p>
        </div>
    </div>

    <script>
        const rawQuestionBank = [
            { q: "國家的稅收分為哪兩類？", options: ["國稅及地方稅", "所得稅及房屋稅", "地價稅及營業稅"], correct: "國稅及地方稅" },
            { q: "下列哪一種稅屬於地方稅？", options: ["萬萬稅", "贈與稅", "房屋稅"], correct: "房屋稅" },
            { q: "請問唯一官方版儲存雲端發票的APP是哪一個？", options: ["發票怪獸APP", "統一發票兌獎APP", "雲端發票APP"], correct: "統一發票兌獎APP" },
            { q: "遇到稅捐有爭議時可以找誰幫忙？", options: ["消保官", "法務官", "納保官"], correct: "納保官" },
            { q: "雲端發票的好處有什麼？", options: ["主動通知中獎", "發票變大", "免費看電影"], correct: "主動通知中獎" },
            { q: "買東西時不印出紙本發票，把發票存在手機條碼裡，這叫做什麼？", options: ["隱形發票", "空氣發票", "雲端發票"], correct: "雲端發票" },
            { q: "每年 4 月要繳什麼稅才能上路？", options: ["紅綠燈稅", "使用牌照稅", "停車稅"], correct: "使用牌照稅" },
            { q: "看電影、去遊樂園玩，門票包含什麼稅？", options: ["開心稅", "贈與稅", "娛樂稅"], correct: "娛樂稅" },
            { q: "為什麼要向人民課徵租稅？", options: ["為了國家建設財源", "為了存錢", "為了好玩"], correct: "為了國家建設財源" },
            { q: "下列哪一項是稅金的用途？", options: ["蓋學校", "修馬路", "以上皆是"], correct: "以上皆是" },
            { q: "負責徵收「國稅」的單位是哪一個？", options: ["警察局", "國稅局", "稅捐處"], correct: "國稅局" },
            { q: "每年11月要繳納土地的什麼稅？", options: ["地價稅", "牌照稅", "營業稅"], correct: "地價稅" }
        ];

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let gameQuestions = [], currentIdx = 0, score = 0;
        let targets = [], mouse = { x: 0, y: 0 }, isGameOver = false, isWaiting = false;
        let timeLeft = 8, timerInterval;

        function showRegister() { document.getElementById('registerBox').style.display = 'block'; }
        function confirmEntry() {
            if (!document.getElementById('playerName').value) return alert("請輸入班級姓名");
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('game-wrapper').style.display = 'block';
            resize();
            initGame();
            animate();
        }

        // 重新調整畫布尺寸與靶子位置
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            setupTargets();
        }
        window.addEventListener('resize', resize);

        class Target {
            constructor(label, xMin, xMax, y) {
                this.label = label;
                this.xMin = xMin; this.xMax = xMax; this.y = y;
                this.w = 80; this.h = 100;
                this.x = xMin + Math.random() * (xMax - xMin - this.w);
                this.speed = 1.2 + Math.random() * 0.8;
                this.dir = 1; this.isDown = false; this.tilt = 0;
            }
            update() {
                if (!this.isDown) {
                    this.x += this.speed * this.dir;
                    if (this.x < this.xMin || this.x > this.xMax - this.w) this.dir *= -1;
                } else if (this.tilt < 1.5) this.tilt += 0.2;
            }
            draw() {
                ctx.save();
                ctx.translate(this.x + this.w/2, this.y + this.h);
                ctx.rotate(this.tilt);
                ctx.translate(-this.w/2, -this.h);
                // 靶心發光效果
                ctx.shadowBlur = this.isDown ? 0 : 15;
                ctx.shadowColor = "#4fd1c5";
                ctx.fillStyle = "#1e293b"; ctx.beginPath(); ctx.arc(this.w/2, 40, 35, 0, Math.PI*2); ctx.fill();
                ctx.strokeStyle = "#4fd1c5"; ctx.lineWidth = 3; ctx.stroke();
                ctx.fillStyle = "white"; ctx.font = "bold 32px Arial"; ctx.textAlign = "center";
                ctx.fillText(this.label, this.w/2, 52);
                ctx.restore();
            }
            checkHit(mx, my) {
                if (this.isDown || isWaiting) return false;
                const dist = Math.sqrt((mx - (this.x + this.w/2))**2 + (my - (this.y + 40))**2);
                return dist < 40;
            }
        }

        function setupTargets() {
            const yPos = canvas.height * 0.7; // 靶子放在螢幕下方 70% 處，避免被題目遮住
            const third = canvas.width / 3;
            targets = [
                new Target('A', 10, third - 10, yPos),
                new Target('B', third + 10, third * 2 - 10, yPos),
                new Target('C', third * 2 + 10, canvas.width - 10, yPos)
            ];
        }

        function initGame() {
            const shuffled = [...rawQuestionBank].sort(() => 0.5 - Math.random()).slice(0, 10);
            gameQuestions = shuffled.map(q => {
                const opts = [...q.options];
                return { ...q, opts, ans: ["A","B","C"][opts.indexOf(q.correct)] };
            });
            nextQuestion();
        }

        function nextQuestion() {
            if (currentIdx >= 10) return endGame();
            
            isWaiting = false;
            targets.forEach(t => { t.isDown = false; t.tilt = 0; });
            const q = gameQuestions[currentIdx];
            
            document.getElementById('question-text').innerText = q.q;
            document.getElementById('opt-A').innerText = q.opts[0];
            document.getElementById('opt-B').innerText = q.opts[1];
            document.getElementById('opt-C').innerText = q.opts[2];
            document.getElementById('progress-text').innerText = `進度：${currentIdx + 1} / 10`;
            
            document.querySelectorAll('.option-box').forEach(b => b.classList.remove('option-correct'));
            resetTimer();
        }

        function resetTimer() {
            clearInterval(timerInterval);
            timeLeft = 8;
            timerInterval = setInterval(() => {
                if (isWaiting || isGameOver) return;
                timeLeft -= 0.1;
                document.getElementById('timer-bar').style.width = (timeLeft/8)*100 + "%";
                if (timeLeft <= 0) {
                    handleTimeOut();
                }
            }, 100);
        }

        function handleTimeOut() {
            isWaiting = true;
            clearInterval(timerInterval);
            showFeedback("超時了！", false);
            revealAnswer();
        }

        function revealAnswer() {
            const correctLetter = gameQuestions[currentIdx].ans;
            document.getElementById('box-' + correctLetter).classList.add('option-correct');
            // 延遲跳轉下一題
            setTimeout(() => {
                if (!isGameOver) {
                    currentIdx++;
                    nextQuestion();
                }
            }, 1500);
        }

        function handleHit() {
            if (isWaiting || isGameOver) return;
            targets.forEach(t => {
                if (t.checkHit(mouse.x, mouse.y)) {
                    isWaiting = true; t.isDown = true;
                    clearInterval(timerInterval);
                    if (t.label === gameQuestions[currentIdx].ans) {
                        score += 10; document.getElementById('score').innerText = score;
                        showFeedback("命中！", true);
                    } else {
                        showFeedback("錯了！", false);
                    }
                    revealAnswer();
                }
            });
        }

        function showFeedback(txt, isGood) {
            const f = document.getElementById('feedback');
            f.innerText = txt; f.style.color = isGood ? "#4fd1c5" : "#f87171";
            f.style.opacity = 1;
            setTimeout(() => f.style.opacity = 0, 1000);
        }

        function endGame() {
            isGameOver = true;
            clearInterval(timerInterval);
            document.getElementById('result-screen').style.display = "flex";
            document.getElementById('final-score').innerText = score;
            const name = document.getElementById('playerName').value;
            // 表單串接
            const url = `https://docs.google.com/forms/d/e/1FAIpQLSe_wsv6i2HiQnM-MtJ4Kb2ZEwmGnLKdUC52lTqrMZ3he-qrSQ/formResponse?entry.628463820=${encodeURIComponent(name)}&entry.1081135647=${score}&submit=Submit`;
            fetch(url, { mode: 'no-cors' });
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            targets.forEach(t => { t.update(); t.draw(); });
            
            // 繪製準星
            ctx.strokeStyle = "#4fd1c5"; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.arc(mouse.x, mouse.y, 15, 0, Math.PI*2); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(mouse.x-20, mouse.y); ctx.lineTo(mouse.x+20, mouse.y); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(mouse.x, mouse.y-20); ctx.lineTo(mouse.x, mouse.y+20); ctx.stroke();
            requestAnimationFrame(animate);
        }

        // --- 同時支援手機、平板、電腦的座標轉換與監聽 ---
        const getPos = (e) => {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;

            // 換算縮放比例，解決解析度不一導致的偏移
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;

            mouse.x = (clientX - rect.left) * scaleX;
            mouse.y = (clientY - rect.top) * scaleY;
        };

        canvas.addEventListener('mousemove', getPos);
        canvas.addEventListener('mousedown', (e) => { getPos(e); handleHit(); });
        
        // 修正平板與手機的觸控衝突
        canvas.addEventListener('touchstart', (e) => { 
            if (e.cancelable) e.preventDefault(); 
            getPos(e); 
            handleHit(); 
        }, { passive: false });

    </script>
</body>
</html>
